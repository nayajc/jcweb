<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#2a3145"/>
      <stop offset="60%" stop-color="#171b26"/>
    </radialGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb454"/>
      <stop offset="100%" stop-color="#ff6b81"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <!-- connection lines -->
  <g stroke="#2c3245" stroke-width="2" fill="none" opacity="0.7">
    <line x1="300" y1="400" x2="480" y2="400"/>
    <line x1="800" y1="400" x2="980" y2="400"/>
    <line x1="640" y1="240" x2="640" y2="300"/>
  </g>
  <!-- side nodes -->
  <circle cx="260" cy="400" r="34" fill="#181c26" stroke="#ffb454" stroke-width="2"/>
  <circle cx="1020" cy="400" r="34" fill="#181c26" stroke="#ff6b81" stroke-width="2"/>
  <rect x="228" y="368" width="64" height="64" rx="14" fill="none"/>
  <!-- robot head -->
  <g transform="translate(640,400)">
    <rect x="-140" y="-120" width="280" height="220" rx="36" fill="#181c26" stroke="#262b38" stroke-width="3"/>
    <circle cx="-60" cy="-10" r="26" fill="url(#grad)"/>
    <circle cx="60" cy="-10" r="26" fill="url(#grad)"/>
    <rect x="-70" y="60" width="140" height="14" rx="7" fill="#8b90a0"/>
    <rect x="-18" y="-170" width="36" height="50" rx="8" fill="#262b38"/>
    <circle cx="0" cy="-178" r="12" fill="#ffb454"/>
  </g>
  <text x="640" y="620" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="34" font-weight="700" fill="#e8eaf0">Automation Systems</text>
  <text x="640" y="660" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#8b90a0">Bots &amp; dashboards, quietly running in the background</text>
</svg>
